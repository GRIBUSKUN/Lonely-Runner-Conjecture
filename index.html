<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css">
    <title>The Lonely Players conjecture</title>
</head>

<body>
    <div id="app">
        <div id="ui-panel">
            <div class="panel-header">Loneliest Runner</div>
            <label>
                Players
                <input id="player-count" type="number" min="3" max="12" value="5" />
            </label>
            <label>
                Speed multiplier
                <input id="speed-multiplier" type="range" min="0.002" max="0.05" step="0.001" value="0.01" />
            </label>
            <div class="field-note">
                Current max speed: <span id="speed-multiplier-value">0.01</span>
            </div>
            <div class="button-row">
                <button id="restart-button" type="button">Restart</button>
                <button id="randomize-speeds-button" type="button">Randomize speeds</button>
            </div>
            <div class="info-block">
                <div>Status: <span id="status-text">Ready</span></div>
                <div>Lonely players: <span id="lonely-count">0</span> / <span id="player-total">0</span></div>
                <div>Threshold: <span id="lonely-threshold">0</span>°</div>
                <div>Speeds: <span id="speed-list"></span></div>
            </div>
        </div>
        <div id="pixi-container"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
